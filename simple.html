<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Sengila Construction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #333; margin-bottom: 10px; }
        h2 { color: #667eea; margin-top: 0; }
        .demo { color: #666; margin: 20px 0; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background: #5a67d8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>??? Sengila Construction</h1>
        <h2>Contractor Portal</h2>
        <p class="demo">Demo credentials: contractor1 / contractor123</p>
        <button onclick="alert('React app coming soon!')">
            Coming Soon
        </button>
        <p style="margin-top: 20px; font-size: 12px; color: #999;">
            Site is live! React app being deployed...
        </p>
    </div>
</body>
</html>
